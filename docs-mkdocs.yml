site_name: MkDocs Modern Theme
site_url: https://ralph089.github.io/mkdocs-modern-theme/
site_dir: docs-site
docs_dir: docs
repo_url: https://github.com/ralph089/mkdocs-modern-theme

theme:
  name: modern
  logo: assets/logo.svg

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
    - Configuration: configuration.md
    - Extensions: extensions.md
    - Deployment: deployment.md
  - Customization:
    - Theming: customization/theming.md
    - Colors: customization/colors.md
    - Typography: customization/typography.md
    - Layout: customization/layout.md
  - Content:
    - Admonitions: content/admonitions.md
    - Code Blocks: content/code-blocks.md
    - Tabs: content/tabs.md
    - Tables: content/tables.md
    - Cards: content/cards.md
    - Steps: content/steps.md
    - File Tree: content/file-tree.md
    - Mermaid Diagrams: content/mermaid.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mkdocs_modern_theme.mermaid.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true
  - tables
  - def_list

plugins:
  - search
  - glightbox
