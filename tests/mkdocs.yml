site_name: MkDocs Modern Theme
site_url: https://ralph089.github.io/mkdocs-modern-theme/
site_dir: site
docs_dir: docs
repo_url: https://github.com/ralph089/mkdocs-modern-theme
copyright: Copyright &copy; 2025 Ralph

theme:
  name: modern
  logo: assets/logo.svg
  color_mode: system
  navigation_depth: 3
  show_toc: true
  show_breadcrumbs: true
  show_prev_next: true
  show_edit_link: true
  show_copy_markdown: true
  show_last_updated: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Development: getting-started/development.md
  - Guide:
    - Writing Docs: guide/writing-docs.md
    - Admonitions: guide/admonitions.md
    - Code Blocks: guide/code-blocks.md
    - Mermaid Diagrams: guide/mermaid.md
    - pymdownx Extensions: guide/pymdownx.md
    - Components: guide/components.md
  - Reference:
    - API: reference/api.md
    - Changelog: reference/changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      linenums_style: table
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mkdocs_modern_theme.mermaid.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
