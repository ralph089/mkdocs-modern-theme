{# Search modal — Ctrl+K / Cmd+K #}
<template x-teleport="body">
  <div x-show="$store.search.isOpen"
       x-trap.noscroll="$store.search.isOpen"
       @keydown.escape.window="$store.search.close()"
       role="dialog"
       aria-label="{% trans %}Search documentation{% endtrans %}"
       class="fixed inset-0 z-50"
       x-cloak>
    {# Backdrop #}
    <div x-show="$store.search.isOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="$store.search.close()"
         class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

    {# Modal #}
    <div x-show="$store.search.isOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="relative mx-auto mt-[15vh] max-w-xl w-[calc(100%-2rem)] bg-[var(--modern-surface)] rounded-[var(--modern-radius-lg)] border border-[var(--modern-border)] shadow-[var(--modern-shadow-lg)] overflow-hidden">

      {# Search input #}
      <div class="flex items-center gap-3 px-4 border-b border-[var(--modern-border)]">
        <svg class="w-5 h-5 text-[var(--modern-text-tertiary)] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input x-ref="searchInput"
               x-model.debounce.200ms="$store.search.query"
               @keydown.arrow-down.prevent="$store.search.nextResult()"
               @keydown.arrow-up.prevent="$store.search.prevResult()"
               @keydown.enter.prevent="$store.search.goToResult()"
               type="text"
               placeholder="{% trans %}Search documentation...{% endtrans %}"
               class="flex-1 py-3.5 bg-transparent text-[var(--modern-text-primary)] placeholder-[var(--modern-text-tertiary)] outline-none text-base">
        <kbd class="hidden sm:inline-flex px-1.5 py-0.5 text-xs font-mono rounded border border-[var(--modern-border)] bg-[var(--modern-surface-alt)] text-[var(--modern-text-tertiary)]">
          ESC
        </kbd>
      </div>

      {# Results #}
      <div class="max-h-[60vh] overflow-y-auto overscroll-contain">
        <template x-if="$store.search.query.length > 0 && $store.search.results.length === 0 && !$store.search.loading">
          <div class="px-4 py-8 text-center text-[var(--modern-text-tertiary)]">
            {% trans %}No results found{% endtrans %}
          </div>
        </template>

        <template x-if="$store.search.loading">
          <div class="px-4 py-8 text-center text-[var(--modern-text-tertiary)]">
            {% trans %}Loading search index...{% endtrans %}
          </div>
        </template>

        <ul class="py-2" data-search-results>
          <template x-for="(result, index) in $store.search.results" :key="result.location">
            <li>
              <a :href="result.location"
                 @mouseenter="$store.search.selectedIndex = index"
                 @click="$store.search.close()"
                 class="flex flex-col px-4 py-2.5 mx-2 rounded-[var(--modern-radius-sm)] transition-colors duration-100"
                 :class="$store.search.selectedIndex === index ? 'bg-[var(--modern-accent)]/10 text-[var(--modern-accent)]' : 'text-[var(--modern-text-primary)] hover:bg-[var(--modern-surface-alt)]'">
                <span class="font-medium text-sm" x-text="result.title"></span>
                <span class="text-xs mt-0.5 line-clamp-1 opacity-70" x-text="result.text" x-show="result.text"></span>
              </a>
            </li>
          </template>
        </ul>
      </div>

      {# Footer hints #}
      <div class="flex items-center gap-4 px-4 py-2.5 border-t border-[var(--modern-border)] text-xs text-[var(--modern-text-tertiary)]">
        <span class="flex items-center gap-1">
          <kbd class="px-1 py-0.5 rounded border border-[var(--modern-border)] bg-[var(--modern-surface-alt)]">&uarr;</kbd>
          <kbd class="px-1 py-0.5 rounded border border-[var(--modern-border)] bg-[var(--modern-surface-alt)]">&darr;</kbd>
          {% trans %}navigate{% endtrans %}
        </span>
        <span class="flex items-center gap-1">
          <kbd class="px-1 py-0.5 rounded border border-[var(--modern-border)] bg-[var(--modern-surface-alt)]">&crarr;</kbd>
          {% trans %}open{% endtrans %}
        </span>
        <span class="flex items-center gap-1">
          <kbd class="px-1 py-0.5 rounded border border-[var(--modern-border)] bg-[var(--modern-surface-alt)]">esc</kbd>
          {% trans %}close{% endtrans %}
        </span>
      </div>
    </div>
  </div>
</template>
