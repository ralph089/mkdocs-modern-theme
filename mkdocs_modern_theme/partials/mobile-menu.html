{# Mobile sidebar overlay #}
<template x-teleport="body">
  <div x-show="$store.mobile.isOpen"
       class="fixed inset-0 z-50 lg:hidden"
       x-cloak>
    {# Backdrop #}
    <div x-show="$store.mobile.isOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="$store.mobile.close()"
         class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
    {# Sidebar panel #}
    <div x-show="$store.mobile.isOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="-translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="-translate-x-full"
         x-trap.noscroll="$store.mobile.isOpen"
         class="relative w-[280px] max-w-[80vw] h-full bg-[var(--modern-surface-sidebar)] border-r border-[var(--modern-border)] overflow-y-auto">
      {# Close button #}
      <div class="flex items-center justify-between px-4 h-[var(--modern-header-height)] border-b border-[var(--modern-border)]">
        <span class="font-semibold text-[var(--modern-text-primary)]">{{ config.site_name }}</span>
        <button @click="$store.mobile.close()"
                class="p-1.5 rounded-[var(--modern-radius-sm)] text-[var(--modern-text-secondary)] hover:text-[var(--modern-text-primary)] hover:bg-[var(--modern-surface-alt)] transition-colors duration-150"
                aria-label="{% trans %}Close navigation{% endtrans %}">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      {# Nav items #}
      <nav class="py-4 px-2 text-sm"
           aria-label="{% trans %}Mobile navigation{% endtrans %}">
        {% for nav_item in nav %}
          {% include "partials/sidebar-nav-item.html" %}
        {% endfor %}
      </nav>
    </div>
  </div>
</template>
